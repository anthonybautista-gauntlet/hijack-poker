service: rewards-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  stage: local
  region: us-east-1
  environment:
    STAGE: local
    DYNAMODB_ENDPOINT: ${env:DYNAMODB_ENDPOINT, 'http://localhost:8000'}
    REWARDS_PLAYERS_TABLE: ${env:REWARDS_PLAYERS_TABLE, 'rewards-players'}
    REWARDS_TRANSACTIONS_TABLE: ${env:REWARDS_TRANSACTIONS_TABLE, 'rewards-transactions'}
    REWARDS_LEADERBOARD_TABLE: ${env:REWARDS_LEADERBOARD_TABLE, 'rewards-leaderboard'}
    REWARDS_NOTIFICATIONS_TABLE: ${env:REWARDS_NOTIFICATIONS_TABLE, 'rewards-notifications'}
    REWARDS_TIER_HISTORY_TABLE: ${env:REWARDS_TIER_HISTORY_TABLE, 'rewards-tier-history'}
    ADMIN_API_KEY: ${env:ADMIN_API_KEY, 'admin-secret-key'}
    AWS_REGION: ${env:AWS_REGION, 'us-east-1'}
    AWS_ACCESS_KEY_ID: ${env:AWS_ACCESS_KEY_ID, 'local'}
    AWS_SECRET_ACCESS_KEY: ${env:AWS_SECRET_ACCESS_KEY, 'local'}
    MYSQL_HOST: ${env:MYSQL_HOST, 'localhost'}
    MYSQL_PORT: ${env:MYSQL_PORT, '3306'}
    MYSQL_USER: ${env:MYSQL_USER, 'hijack'}
    MYSQL_PASSWORD: ${env:MYSQL_PASSWORD, 'hijack_dev'}
    MYSQL_DATABASE: ${env:MYSQL_DATABASE, 'hijack_poker'}

functions:
  api:
    handler: handler.api
    events:
      - httpApi: '*'

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 5000
    lambdaPort: 5002
